services:
  - type: web
    name: lms-api
    runtime: node
    buildCommand: npm install --include=dev && node scripts/with-normalized-env.js "npx prisma generate && npm run build"
    startCommand: node scripts/start-with-migrate.js
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: CORS_ORIGIN
        sync: false
      - key: COOKIE_DOMAIN
        sync: false
      - key: ADMIN_EMAIL
        sync: false
